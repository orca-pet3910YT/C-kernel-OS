name: Compile CkOS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: chmod
      run: chmod +x scripts/*.sh
    - name: installpkg
      run: sudo apt install nasm xorriso clang lld
    - name: make
      run: sh -c "make cl; make"
